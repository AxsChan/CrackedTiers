<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CDTIERS | Login</title>
  <link rel="icon" type="image/png" href="/icon/website.png" />
  
  <!-- OPTIMIZATION: Preconnect to Convex -->
  <link rel="preconnect" href="https://canny-bird-190.convex.cloud">
  <link rel="dns-prefetch" href="https://canny-bird-190.convex.cloud">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- 1. Define the Turnstile callback FIRST -->
  <script>
    window.onloadTurnstileCallback = function () {
      if (window.turnstile) {
        window.turnstile.render('#turnstile-container', {
          // Use your real sitekey for production
          sitekey: '0x4AAAAAADyXbLuHYN1Y70bv', 
          theme: 'dark',
          callback: function(token) { window.turnstileToken = token; },
          'expired-callback': function() { window.turnstileToken = null; }
        });
      }
    };
  </script>
  <!-- 2. Load the Turnstile API script with async defer -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onloadTurnstileCallback" async defer></script>

  <style>
    :root { --bg:#0a0e1a; --surface:#0f1524; --surface-2:#131a2b; --card:#171f33; --card-hover:#1c2540; --border:#1e2740; --border-light:#29334f; --text:#f0f2f8; --text-muted:#7a869e; --text-dim:#4d5878; --accent:#8b5cf6; --accent-2:#a78bfa; --gold:#fbbf24; --danger:#ef4444; }
    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Geist',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x: hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:-1; background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(139,92,246,.08), transparent 60%),radial-gradient(ellipse 50% 40% at 80% 20%, rgba(251,191,36,.05), transparent 60%),radial-gradient(ellipse 70% 50% at 50% 90%, rgba(59,130,246,.06), transparent 60%); pointer-events:none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    ::-webkit-scrollbar{width:6px;height:6px} 
    ::-webkit-scrollbar-track{background:transparent} 
    ::-webkit-scrollbar-thumb{background:#29334f;border-radius:10px}
    header{position:sticky;top:12px;z-index:100;max-width:1200px;margin:12px auto 0;background:rgba(15,21,36,.9);backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border);border-radius:14px;padding:0 20px;height:66px;display:flex;align-items:center}
    nav{width:100%;display:flex;align-items:center;gap:8px}
    .nav-brand{text-decoration:none;display:flex;align-items:center;flex-shrink:0;height:100%;transition:transform .2s}
    .nav-brand:hover{transform:translateY(-1px)}
    .nav-brand img{height:42px;width:auto;image-rendering:pixelated;filter:drop-shadow(0 2px 10px rgba(251,191,36,.25));transition:filter .25s}
    .nav-brand:hover img{filter:drop-shadow(0 3px 14px rgba(251,191,36,.45))}
    .nav-center{display:flex;gap:4px;align-items:center;margin:0 auto}
    .nav-link{padding:8px 16px;border-radius:10px;font-size:.92rem;font-weight:600;color:var(--text-muted);text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:8px;cursor:pointer}
    .nav-link:hover{color:var(--text);background:rgba(255,255,255,.04)} 
    .nav-link.active{color:var(--text)} 
    .nav-link svg{width:18px;height:18px;flex-shrink:0}
    .nav-right{display:flex;gap:10px;align-items:center;flex-shrink:0}
    .cta-btn-sm{display:inline-flex;align-items:center;gap:6px;padding:0 18px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent-2));border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:.88rem;font-weight:700;text-decoration:none;cursor:pointer;transition:transform .2s, box-shadow .2s;box-shadow:0 2px 12px rgba(139,92,246,.35);}
    .cta-btn-sm:hover{transform:translateY(-1px);box-shadow:0 4px 18px rgba(139,92,246,.55)} 
    .cta-btn-sm.secondary{background:rgba(255,255,255,.04);border:1px solid var(--border-light);color:var(--text);box-shadow:none} 
    .cta-btn-sm.secondary:hover{background:rgba(255,255,255,.08)}
    main { max-width: 1200px; margin: 0 auto; padding: 20px; min-height: calc(100vh - 100px); display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 400px; animation: fadeUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .login-header { text-align: center; margin-bottom: 24px; }
    .logo-text { font-size: 1.8rem; font-weight: 900; text-decoration:none; color:var(--text); } 
    .logo-text span { color: var(--gold); text-shadow: 0 0 20px rgba(251, 191, 36, 0.4); }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .form-group { margin-bottom: 16px; } 
    .form-label { display: block; font-size: 0.7rem; color: var(--text-muted); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; } 
    .form-input { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border-light); background: var(--card); color: var(--text); font-family: inherit; font-size: 0.9rem; outline: none; transition: 0.2s; } 
    .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(139,92,246,.15); }
    .btn { padding: 12px 20px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.2s; border: none; font-size: 0.9rem; font-family: inherit; text-align:center; text-decoration:none; display:inline-block; width:100%; margin-top:10px; } 
    .btn-primary { background: linear-gradient(135deg,var(--accent),var(--accent-2)); color: #fff; box-shadow: 0 4px 18px rgba(139,92,246,.35); } 
    .btn-primary:hover { background: #7c3aed; transform: translateY(-2px); box-shadow: 0 8px 28px rgba(139,92,246,.6), 0 0 25px rgba(139,92,246,.4); } 
    .btn-secondary { background: var(--card); color: var(--text-muted); border: 1px solid var(--border-light); } 
    .btn-secondary:hover { background: #1c2540; color: var(--text); border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); } 
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
    .error-msg { color: var(--danger); text-align: center; margin-top: 12px; font-size: 0.85rem; font-weight: 600; } 
    .divider { height: 1px; background: var(--border); margin: 24px 0; } 
    p { color:var(--text-muted); font-size:0.9rem; margin-top:4px; } 
    .hidden { display: none !important; }
    .captcha-container { display: flex; justify-content: center; margin-bottom: 16px; }
    @media(max-width:768px){.nav-center{display:none}}
  </style>
</head>
<body>
  <header>
    <nav>
      <a class="nav-brand" href="/home" title="CDTiers"><img src="/icon/cdtiers.png" alt="CDTiers" onerror="this.style.display='none'"></a>
      <div class="nav-center">
        <a class="nav-link" href="/home"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
        <a class="nav-link" href="/index"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0z"/></svg>Rankings</a>
      </div>
      <div class="nav-right" id="authButtons"><a href="/register" class="cta-btn-sm">Register</a></div>
    </nav>
  </header>

  <main>
    <div class="login-box">
      <div class="login-header">
        <a href="/home" class="logo-text">CD<span>Tiers</span></a>
        <p>Sign in to manage your tiers and profile</p>
      </div>
      <div class="card">
        <div class="form-group">
          <label class="form-label">Username or Email</label>
          <input type="text" id="loginInput" class="form-input" placeholder="Enter your username or email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" id="loginPass" class="form-input" placeholder="Enter your password" onkeydown="if(event.key==='Enter') document.getElementById('loginBtn').click()">
        </div>
        <div id="turnstile-container" class="captcha-container"></div>
        <button id="loginBtn" class="btn btn-primary">Sign In</button>
        <div id="loginError" class="error-msg hidden"></div>
        <div class="divider"></div>
        <a href="/register" class="btn btn-secondary">Create an Account</a>
      </div>
    </div>
  </main>

  <script src="/config.js"></script>
  <script type="module">
    import { ConvexClient } from 'https://esm.sh/convex/browser';
    
    if (!window.CONFIG || !window.CONFIG.convex) {
      console.error("CRITICAL: Convex URL is missing in config.js!");
      alert("Configuration error: Convex URL is missing.");
    } else {
      const convex = new ConvexClient(window.CONFIG.convex.url);

      async function checkSession() { 
        const token = localStorage.getItem('auth_token');
        if (token) {
          const user = await convex.query("auth:getCurrentUser", { token });
          if (user) window.location.href = '/profile';
        }
      }
      checkSession();

      document.getElementById('loginBtn').onclick = async () => {
        const loginInput = document.getElementById('loginInput').value.trim();
        const pass = document.getElementById('loginPass').value;
        const errBox = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');
        
        if (!loginInput || !pass) { 
          errBox.textContent = 'Please enter both fields'; 
          errBox.classList.remove('hidden'); 
          return; 
        }
        
        const turnstileToken = window.turnstileToken;
        if (!turnstileToken) { 
          errBox.textContent = 'Please complete the CAPTCHA verification.'; 
          errBox.classList.remove('hidden'); 
          return; 
        }
        
        btn.disabled = true; 
        btn.textContent = 'Signing in...'; 
        errBox.classList.add('hidden');
        
        try {
          const result = await convex.action("authActions:login", { 
            loginInput, 
            password: pass,
            captchaToken: turnstileToken 
          });
          
          localStorage.setItem('auth_token', result.token);
          
          // OPTIMIZATION: Cache the user profile so the navbar doesn't flicker on the next page
          const profile = await convex.query("auth:getCurrentUser", { token: result.token });
          if (profile) {
            localStorage.setItem('cached_user', JSON.stringify(profile));
          }
          
          window.location.href = '/profile';
        } catch (err) {
          errBox.textContent = err.message || 'Login failed'; 
          errBox.classList.remove('hidden'); 
          window.turnstileToken = null; 
          if (window.turnstile) window.turnstile.reset('#turnstile-container');
        } finally { 
          btn.disabled = false; 
          btn.textContent = 'Sign In'; 
        }
      };
    }
  </script>
</body>
</html>
